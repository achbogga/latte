name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: Trunk Check
        uses: trunk-io/trunk-action@v1
      - name: Lint
        run: |
          pnpm lint
          pnpm format:check
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
